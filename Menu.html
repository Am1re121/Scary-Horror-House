<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><Menu></Menu></title>
</head>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh; 
        overflow-y: hidden;
    }

    #menu-image {
        width: 100%;

    }

    #buttonstart-image {
        position: absolute;
        width: 300px; 
        cursor: pointer;
        top: 50%;
    }

    #game-title {
        position: absolute;
        top: 20%;
        color: #a9a9a9;
        font-size: 80px;
        text-align: center;
        font-family: 'Arial', sans-serif;
    }
</style>

<body>
    <img src="Assets/Menu/eyesmenu.png" id="menu-image" alt="Menu Image">
    <img src="Assets/Menu/buttonstart.png" id="buttonstart-image" alt="Start Button" onclick="gotoLevel1()">
    <h1 id="game-title">Scary House Horror</h1>

    <audio id="background-music" autoplay>
        <source src="Assets/Menu/Music/tiktok-farlands.mp3" type="audio/mpeg">
    </audio>

  


    <script>
        function gotoLevel1() {
            window.location.href = "level1.html";
        }
    </script>
</body>
</html>
