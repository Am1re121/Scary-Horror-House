<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level 3</title>
</head>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center; 
        align-items: center;     
        height: 100vh;
        background-color: #000;
        overflow-y: hidden;
    }

    #level3-image {
        width: 1100px;
        height: 700px;
    }

    #doorpasswordlocker {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 400px;
        background-color: rgba(0, 0, 0, 0.8);
        border: 2px solid #fff;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    #doorpasswordlocker h1 {
        color: #fff;
        margin-bottom: 20px;
    }

    .password-buttons {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .password-buttons div {
        width: 60px;
        height: 60px;
        background-color: #fff;
        color: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        border-radius: 5px;
    }

    #zona-doorlock {
        position: absolute;
        top: 52%;
        left: 34%;
        width: 5%;
        height: 10%;
        cursor: pointer; 
    }

    #exitpassword {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        background-color: #fff;
        color: #ff0000;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        border-radius: 50%;
    }

    #password-display {
        color: #fff;
        margin-bottom: 20px;
    }

    @keyframes shake {
        0% { transform: translate(-50%, -50%) translateX(0); }
        25% { transform: translate(-50%, -50%) translateX(-8px); }
        50% { transform: translate(-50%, -50%) translateX(8px); }
        75% { transform: translate(-50%, -50%) translateX(-8px); }
        100% { transform: translate(-50%, -50%) translateX(0); }
    }

    .shake {
        animation: shake 0.3s;
    }


    #zona-password {
        position: absolute;
        top: 50%;
        left: 60%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        border-radius: 10px;
        cursor: pointer;
    }

    #password-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 200px;
        z-index: 9999;
    }

    #creepy1-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 900px;
        height: 800px;
        z-index: 9999;
    }

    #creepy2-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 1100px;
        height: 1000px;
        z-index: 9999;
    }


    #zona-creepy {
        position: absolute;
        top: 90%;
        left: 35%;
        transform: translate(-50%, -50%);
        width: 350px;
        height: 70px;
        border-radius: 10px;
        cursor: pointer;
    }

    #zona-creepy2 {
        position: absolute;
        top: 90%;
        left: 70%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        border-radius: 10px;
        cursor: pointer;
    }

    #zona-creepy3 {
        position: absolute;
        top: 70%;
        left: 55%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        border-radius: 10px;
        cursor: pointer;
    }


    #zona-creepy4 {
        position: absolute;
        top: 45%;
        left: 80%;
        transform: translate(-50%, -50%);
        width: 90px;
        height: 90px;
        border-radius: 10px;
        cursor: pointer;
    }

    #text1-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
    }

    #text2-image {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 500px;
    }
</style>
<body>
    <img src="Assets/Level3/level3.png" id="level3-image" alt="Level 3 Image">
    <img src="Assets/Level3/creepy1.png" id="creepy1-image" alt="Creepy 1 Image" style="display: none;">
    <img src="Assets/Level3/password.png" id="password-image" alt="Password Image" style="display: none;">
    <img src="Assets/Level3/creepy2.png" id="creepy2-image" alt="Creepy 2 Image" style="display: none;">
    <img src="Assets/Level3/text1.png" id="text1-image" alt="Text 1 Image">
    <img src="Assets/Level3/text2.png" id="text2-image" alt="Text 2 Image" style="display: none;">
    <audio id="scream1" >
        <source src="Assets/Level3/Music/scream1.mp3" type="audio/mpeg">
    </audio>

    <audio id="scream2" >
        <source src="Assets/Level3/Music/scream2.mp3" type="audio/mpeg">
    </audio>

    <audio id="scarry1" >
        <source src="Assets/Level3/Music/scarry1.mp3" type="audio/mpeg">
    </audio>
    <audio id="background" autoplay loop>
        <source src="Assets/Level3/Music/background.mp3" type="audio/mpeg">
    </audio>

    <div id="doorpasswordlocker" style="display: none;">
        <h1>Введите пароль</h1>
        <h2 id="password-display"></h2>
        <div id="exitpassword" onclick="closePasswordLocker()">X</div>
        <div class="password-buttons">
            <div class="key">1</div>
            <div class="key">2</div>
            <div class="key">3</div>
            <div class="key">4</div>
            <div class="key">5</div>
            <div class="key">6</div>
            <div class="key">7</div>
            <div class="key">8</div>
            <div class="key">9</div>
            <div class="key">0</div>
        </div>
    </div>

    <div id="zona-doorlock" onclick="openPasswordLocker()"></div>

    <div id="zona-password" onclick="openPassword()"></div>

    <div id="zona-creepy" onclick="openCreepy1()"></div>
    <div id="zona-creepy2" onclick="openCreepy2()"></div>
    <div id="zona-creepy3" onclick="openCreepy3()"></div>
    <div id="zona-creepy4" onclick="openCreepy4()"></div>
    <script>
        let passwordInput = '';
        let correctPassword = '0607';
        let keys = document.querySelectorAll('.key');
        let text1 = document.getElementById("text1-image");
        let text2 = document.getElementById("text2-image");

        setInterval(() => {
            if(Math.random() < 0.3) {
                document.getElementById('scarry1').play();
            }
        }, 1000);


        setTimeout(() => {
            text1.style.display = 'none';
            text2.style.display = 'block';
        }, 3000);

        setTimeout(() => {
            text2.style.display = 'none';
        }, 6000);


        function openPasswordLocker() {
            document.getElementById('doorpasswordlocker').style.display = 'flex';
        }

        function closePasswordLocker() {
            document.getElementById('doorpasswordlocker').style.display = 'none';
        }

        keys.forEach(key => {
            key.addEventListener('click', () => {
                passwordInput += key.textContent;

                if (passwordInput.length === 4) {
                    if (passwordInput === correctPassword) {
                        document.getElementById('password-display').textContent = 'Дверь открыта!';
                        setTimeout(() => {
                            window.location.href = "level4.html";
                        }, 2000);
                        
                    } else {
                        document.getElementById('password-display').textContent = 'Неверный пароль';
                        document.getElementById('doorpasswordlocker').classList.add('shake');
                        passwordInput = '';
                        setTimeout(() => {
                            document.getElementById('password-display').textContent = '';
                            document.getElementById('doorpasswordlocker').classList.remove('shake');
                        }, 2000);

                        document.getElementById('creepy1-image').style.display = 'block';
                        document.getElementById('scream1').play();
                        setTimeout(() => {
                            document.getElementById('creepy1-image').style.display = 'none';
                        }, 1000);
                    }
                    
                }
            });
        });


        function openPassword() {
            document.getElementById('password-image').style.display = 'block';
            setTimeout(() => {
                document.getElementById('password-image').style.display = 'none';
            }, 1000);
        }

        function openCreepy1() {
            document.getElementById('creepy1-image').style.display = 'block';
            document.getElementById('scream1').play();
            setTimeout(() => {
                document.getElementById('creepy1-image').style.display = 'none';
            }, 1000);
        }

        function openCreepy2() {
            document.getElementById('creepy2-image').style.display = 'block';
            document.getElementById('scream2').play();
            setTimeout(() => {
                document.getElementById('creepy2-image').style.display = 'none';
            }, 2000);
        }

        function openCreepy3() {
            document.getElementById('creepy1-image').style.display = 'block';
            document.getElementById('scream1').play();
            setTimeout(() => {
                document.getElementById('creepy1-image').style.display = 'none';
            }, 1000);
        }

        function openCreepy4() {
            document.getElementById('creepy2-image').style.display = 'block';
            document.getElementById('scream2').play();
            setTimeout(() => {
                document.getElementById('creepy2-image').style.display = 'none';
            }, 2000);
        }




    </script>
</body>
</html>
